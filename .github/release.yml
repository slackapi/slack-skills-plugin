# https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes#configuring-automatically-generated-release-notes
changelog:
  categories:
    - title: 🚀 Enhancements
      labels:
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
    - title: 📚 Documentation
      labels:
        - documentation
    - title: 🧪 Tests
      labels:
        - test
    - title: 🧹 Chores
      labels:
        - chore
    - title: ⬆️ Dependencies
      labels:
        - dependencies
    - title: 🔒 Security
      labels:
        - security
    - title: 📦 Other changes
      labels:
        - "*"
